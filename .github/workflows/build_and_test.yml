name: Build and test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  license-check:
    name: "License Check"
    runs-on: ubuntu-slim
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Check license header
        uses: apache/skywalking-eyes@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config: .github/.licenserc.yaml

  build-macos-26-swift63:
    runs-on: macos-26
    timeout-minutes: 20
    steps:
    - uses: actions/checkout@v6
    - name: Select Xcode 26.4
      run: sudo xcode-select -s /Applications/Xcode_26.4.app/Contents/Developer
    - name: Build
      run: swift build -c release

  build-ubuntu-latest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
    - uses: actions/checkout@v6
    - name: Build
      run: |
        docker run swift:6.3 uname -a
        docker run -v $PWD:/spark -w /spark swift:6.3 swift build -c release

  build-ubuntu-arm:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 20
    steps:
    - uses: actions/checkout@v6
    - name: Build
      run: |
        docker run swift:6.3 uname -a
        docker run -v $PWD:/spark -w /spark swift:6.3 swift build -c release

  integration-test-ubuntu:
    runs-on: ubuntu-latest
    env:
      SPARK_REMOTE: "sc://localhost:15003"
    services:
      spark:
        image: apache/spark:4.0.2
        env:
          SPARK_NO_DAEMONIZE: 1
        ports:
          - 15003:15002
        options: --entrypoint /opt/spark/sbin/start-connect-server.sh
    steps:
    - uses: actions/checkout@v6
    - name: Build
      run: |
        docker run swift:6.3 uname -a
        docker run --add-host=host.docker.internal:host-gateway -v $PWD:/spark -w /spark -e SPARK_REMOTE='sc://host.docker.internal:15003' swift:6.3 swift test --no-parallel -c release

  integration-test-ubuntu-spark41:
    runs-on: ubuntu-latest
    env:
      SPARK_REMOTE: "sc://localhost:15003"
    services:
      spark:
        image: apache/spark:4.1.1-scala
        env:
          SPARK_NO_DAEMONIZE: 1
        ports:
          - 15003:15002
        options: --entrypoint /opt/spark/sbin/start-connect-server.sh
    steps:
    - uses: actions/checkout@v6
    - name: Build
      run: |
        docker run swift:6.3 uname -a
        docker run --add-host=host.docker.internal:host-gateway -v $PWD:/spark -w /spark -e SPARK_REMOTE='sc://host.docker.internal:15003' swift:6.3 swift test --no-parallel -c release

  integration-test-mac-spark41:
    runs-on: macos-26
    timeout-minutes: 20
    env:
      SPARK_LOCAL_IP: localhost
    steps:
    - uses: actions/checkout@v6
    - name: Select Xcode 26.4
      run: sudo xcode-select -s /Applications/Xcode_26.4.app/Contents/Developer
    - name: Build
      run: swift test --filter NOTHING -c release
    - name: Test
      run: |
        curl -LO https://www.apache.org/dyn/closer.lua/spark/spark-4.1.1/spark-4.1.1-bin-hadoop3.tgz?action=download
        tar xvfz spark-4.1.1-bin-hadoop3.tgz && rm spark-4.1.1-bin-hadoop3.tgz
        mv spark-4.1.1-bin-hadoop3 /tmp/spark
        cd /tmp/spark/sbin
        ./start-connect-server.sh
        cd -
        swift test --no-parallel -c release

  integration-test-mac-spark42:
    runs-on: macos-26
    timeout-minutes: 20
    env:
      SPARK_LOCAL_IP: localhost
    steps:
    - uses: actions/checkout@v6
    - name: Select Xcode 26.4
      run: sudo xcode-select -s /Applications/Xcode_26.4.app/Contents/Developer
    - name: Build
      run: swift test --filter NOTHING -c release
    - name: Test
      run: |
        curl -LO https://www.apache.org/dyn/closer.lua/spark/spark-4.2.0-preview3/spark-4.2.0-preview3-bin-hadoop3.tgz?action=download
        tar xvfz spark-4.2.0-preview3-bin-hadoop3.tgz && rm spark-4.2.0-preview3-bin-hadoop3.tgz
        mv spark-4.2.0-preview3-bin-hadoop3/ /tmp/spark
        cd /tmp/spark/sbin
        ./start-connect-server.sh -c spark.sql.timeType.enabled=true
        cd -
        swift test --no-parallel -c release

  integration-test-mac:
    runs-on: macos-26
    timeout-minutes: 20
    env:
      SPARK_LOCAL_IP: localhost
    steps:
    - uses: actions/checkout@v6
    - name: Select Xcode 26.4
      run: sudo xcode-select -s /Applications/Xcode_26.4.app/Contents/Developer
    - name: Build
      run: swift test --filter NOTHING -c release
    - name: Test
      run: |
        curl -LO https://www.apache.org/dyn/closer.lua/spark/spark-4.0.2/spark-4.0.2-bin-hadoop3.tgz?action=download
        tar xvfz spark-4.0.2-bin-hadoop3.tgz && rm spark-4.0.2-bin-hadoop3.tgz
        mv spark-4.0.2-bin-hadoop3 /tmp/spark
        cd /tmp/spark/sbin
        ./start-connect-server.sh
        cd -
        swift test --no-parallel -c release

  integration-test-token:
    runs-on: macos-26
    timeout-minutes: 20
    env:
      SPARK_LOCAL_IP: localhost
      SPARK_CONNECT_AUTHENTICATE_TOKEN: ${{ github.run_id }}-${{ github.run_attempt }}
    steps:
    - uses: actions/checkout@v6
    - name: Select Xcode 26.4
      run: sudo xcode-select -s /Applications/Xcode_26.4.app/Contents/Developer
    - name: Build
      run: swift test --filter NOTHING -c release
    - name: Test
      run: |
        curl -LO https://www.apache.org/dyn/closer.lua/spark/spark-4.1.1/spark-4.1.1-bin-hadoop3.tgz?action=download
        tar xvfz spark-4.1.1-bin-hadoop3.tgz && rm spark-4.1.1-bin-hadoop3.tgz
        mv spark-4.1.1-bin-hadoop3 /tmp/spark
        cd /tmp/spark/sbin
        ./start-connect-server.sh
        cd -
        swift test --no-parallel -c release

  integration-test-mac-spark3:
    runs-on: macos-26
    timeout-minutes: 20
    env:
      SPARK_LOCAL_IP: localhost
    steps:
    - uses: actions/checkout@v6
    - name: Select Xcode 26.4
      run: sudo xcode-select -s /Applications/Xcode_26.4.app/Contents/Developer
    - name: Install Java
      uses: actions/setup-java@v4
      with:
        distribution: zulu
        java-version: 17
    - name: Build
      run: swift test --filter NOTHING -c release
    - name: Test
      run: |
        curl -LO https://www.apache.org/dyn/closer.lua/spark/spark-3.5.8/spark-3.5.8-bin-hadoop3.tgz?action=download
        tar xvfz spark-3.5.8-bin-hadoop3.tgz && rm spark-3.5.8-bin-hadoop3.tgz
        mv spark-3.5.8-bin-hadoop3 /tmp/spark
        cd /tmp/spark/sbin
        ./start-connect-server.sh --packages org.apache.spark:spark-connect_2.12:3.5.8
        cd -
        swift test --no-parallel -c release

  integration-test-mac-spark3-iceberg:
    runs-on: macos-26
    timeout-minutes: 20
    env:
      SPARK_LOCAL_IP: localhost
      SPARK_ICEBERG_TEST_ENABLED: "true"
    steps:
    - uses: actions/checkout@v6
    - name: Select Xcode 26.4
      run: sudo xcode-select -s /Applications/Xcode_26.4.app/Contents/Developer
    - name: Install Java
      uses: actions/setup-java@v4
      with:
        distribution: zulu
        java-version: 17
    - name: Build
      run: swift test --filter NOTHING -c release
    - name: Test
      run: |
        curl -LO https://www.apache.org/dyn/closer.lua/spark/spark-3.5.8/spark-3.5.8-bin-hadoop3.tgz?action=download
        tar xvfz spark-3.5.8-bin-hadoop3.tgz && rm spark-3.5.8-bin-hadoop3.tgz
        mv spark-3.5.8-bin-hadoop3 /tmp/spark
        cd /tmp/spark/sbin
        ./start-connect-server.sh --packages org.apache.spark:spark-connect_2.12:3.5.8,org.apache.iceberg:iceberg-spark-runtime-3.5_2.12:1.10.1 -c spark.sql.catalog.local=org.apache.iceberg.spark.SparkCatalog -c spark.sql.catalog.local.type=hadoop -c spark.sql.catalog.local.warehouse=/tmp/spark/warehouse -c spark.sql.defaultCatalog=local
        cd -
        swift test --filter DataFrameWriterV2Tests -c release
        swift test --filter IcebergTest -c release

  integration-test-mac-spark4-iceberg:
    runs-on: macos-26
    timeout-minutes: 20
    env:
      SPARK_LOCAL_IP: localhost
      SPARK_ICEBERG_TEST_ENABLED: "true"
    steps:
    - uses: actions/checkout@v6
    - name: Select Xcode 26.4
      run: sudo xcode-select -s /Applications/Xcode_26.4.app/Contents/Developer
    - name: Install Java
      uses: actions/setup-java@v4
      with:
        distribution: zulu
        java-version: 17
    - name: Build
      run: swift test --filter NOTHING -c release
    - name: Test
      run: |
        curl -LO https://www.apache.org/dyn/closer.lua/spark/spark-4.0.2/spark-4.0.2-bin-hadoop3.tgz?action=download
        tar xvfz spark-4.0.2-bin-hadoop3.tgz && rm spark-4.0.2-bin-hadoop3.tgz
        mv spark-4.0.2-bin-hadoop3 /tmp/spark
        cd /tmp/spark/sbin
        ./start-connect-server.sh --packages org.apache.spark:spark-connect_2.13:4.0.2,org.apache.iceberg:iceberg-spark-runtime-4.0_2.13:1.10.1 -c spark.sql.catalog.local=org.apache.iceberg.spark.SparkCatalog -c spark.sql.catalog.local.type=hadoop -c spark.sql.catalog.local.warehouse=/tmp/spark/warehouse -c spark.sql.defaultCatalog=local
        cd -
        swift test --filter DataFrameWriterV2Tests -c release
        swift test --filter IcebergTest -c release
